<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Face Recognition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg-1: #0f172a;
    --bg-2: #1e293b;
    --glass: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.15);
    --primary: #6366f1;
    --success: #22c55e;
    --danger: #ef4444;
    --text-main: #f8fafc;
    --text-sub: #cbd5f5;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Inter, system-ui, sans-serif;
    background:
        radial-gradient(1200px 600px at 10% 10%, #1e1b4b, transparent),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    color: var(--text-main);
    min-height: 100vh;
}

.container {
    max-width: 1440px;
    margin: auto;
    padding: 32px;
}

h1 {
    text-align: center;
    font-size: 2.4rem;
    font-weight: 700;
}

.subtitle {
    text-align: center;
    color: var(--text-sub);
    margin: 8px 0 32px;
}

.main-content {
    display: grid;
    grid-template-columns: 3fr 1.2fr;
    gap: 24px;
}

@media (max-width: 1024px) {
    .main-content {
        grid-template-columns: 1fr;
    }
}

/* Video */
.video-panel {
    background: var(--glass);
    padding: 16px;
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
}

#videoStream {
    width: 100%;
    background: #000;
}

.faces-panel {
    background: var(--glass);
    padding: 20px;
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    max-height: 640px;
    overflow-y: auto;
}

.faces-panel h2 {
    margin-bottom: 16px;
}

.face-card {
    background: linear-gradient(180deg,
        rgba(255,255,255,.12),
        rgba(255,255,255,.05)
    );
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    transition: .25s;
}

.face-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
}

.face-card.identified { border-left: 4px solid var(--success); }
.face-card.unknown    { border-left: 4px solid var(--danger); }

.face-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

.face-name {
    font-weight: 600;
}

.face-similarity {
    font-size: .85rem;
    color: var(--text-sub);
}

.enroll-btn {
    background: linear-gradient(135deg, var(--primary), #818cf8);
    border: none;
    color: white;
    padding: 6px 14px;
    cursor: pointer;
    font-size: .85rem;
    transition: .25s;
}

.enroll-btn:hover {
    transform: scale(1.05);
}

/* Stats */
.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 28px;
}

.stat-box {
    background: var(--glass);
    padding: 22px;
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    text-align: center;
}

.stat-value {
    font-size: 2rem;
    font-weight: 700;
    margin-top: 8px;
}

.stat-label {
    font-size: .75rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text-sub);
}

.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
}

.modal.show {
    opacity: 1;
    pointer-events: auto;
}

.modal-content {
    position: relative;
    background: linear-gradient(
        180deg,
        rgba(15,23,42,.95),
        rgba(15,23,42,.85)
    );
    padding: 32px;
    width: 90%;
    max-width: 480px;
    border: 1px solid var(--border);
    box-shadow: 0 40px 80px rgba(0,0,0,.5);
    transform: scale(.92) translateY(20px);
    opacity: 0;
    transition: all .35s cubic-bezier(.22,.61,.36,1);
}

.modal.show .modal-content {
    transform: scale(1) translateY(0);
    opacity: 1;
}

.close {
    position: absolute;
    top: 18px;
    right: 22px;
    font-size: 26px;
    color: var(--text-sub);
    cursor: pointer;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
}

.form-group input {
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,.08);
    border: 1px solid var(--border);
    color: white;
}

.modal-buttons {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

.btn {
    padding: 10px 20px;
    border: none;
    cursor: pointer;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), #818cf8);
    color: white;
}

.btn-secondary {
    background: rgba(255,255,255,.1);
    color: white;
}
</style>
</head>

<body>
<div class="container">
    <h1>Face Recognition</h1>

    <div class="main-content">
        <div class="video-panel">
            <img id="videoStream" src="{{ url_for('video_feed') }}">
        </div>

        <div class="faces-panel">
            <h2>Detected Faces</h2>
            <div id="facesList"></div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">People in Database</div>
            <div class="stat-value" id="dbCount">--</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Faces Detected</div>
            <div class="stat-value" id="facesCount">--</div>
        </div>
    </div>
</div>

<div id="enrollModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Enroll New Person</h2>

        <form id="enrollForm">
            <div class="form-group">
                <label>Name</label>
                <input id="personName" required>
            </div>
            <input type="hidden" id="faceIndex">
            <div class="modal-buttons">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Enroll</button>
            </div>
        </form>
    </div>
</div>

<script>
let currentFacesData = []; 
let stagedEmbedding = null;

function updateFaces() {
    fetch('/get_faces')
        .then(r => r.json())
        .then(data => {
            currentFacesData = data.faces;
            document.getElementById('facesCount').textContent = data.faces.length;
            document.getElementById('dbCount').textContent = data.db_size;

            const facesList = document.getElementById('facesList');
            facesList.innerHTML = data.faces.length === 0
                ? `<div style="opacity:.6;text-align:center">No faces detected</div>`
                : data.faces.map((face,i) => `
                    <div class="face-card ${face.identified?'identified':'unknown'}">
                        <div class="face-header">
                            <div class="face-name">
                                ${face.identified ? '✓ '+face.matches[0].name : '❓ Unknown'}
                            </div>
                            ${face.identified ?
                                `<div class="face-similarity">${(face.matches[0].similarity*100).toFixed(1)}%</div>` :
                                `<button class="enroll-btn" onclick="openEnrollModal(${i})">Enroll</button>`
                            }
                        </div>
                        <div style="font-size:.85rem;opacity:.7">
                            Score: ${face.detection_score.toFixed(3)}
                        </div>
                    </div>
                `).join('');
        })
        .catch(err => console.error("Error fetching faces:", err));
}

function openEnrollModal(index) {
    stagedEmbedding = currentFacesData[index].embedding;
    const enrollModal = document.getElementById('enrollModal');
    enrollModal.classList.add('show');
    // Auto-focus the input field so you can type immediately
    setTimeout(() => document.getElementById('personName').focus(), 150);
}

function closeModal() {
    document.getElementById('enrollModal').classList.remove('show');
    document.getElementById('enrollForm').reset();
    stagedEmbedding = null; 
}

// Close modal event listeners
document.querySelector('.close').onclick = closeModal;
window.onclick = e => {
    if (e.target === document.getElementById('enrollModal')) closeModal();
};
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

// Explicit form submission handler
document.getElementById('enrollForm').addEventListener('submit', function(e) {
    e.preventDefault();

    if (!stagedEmbedding) {
        alert("Error: No face data was captured.");
        return;
    }

    const nameInput = document.getElementById('personName').value;
    const generatedPersonId = 'person_' + Math.random().toString(36).slice(2,9);
    
    // UI Feedback: Change button text and disable it while processing
    const submitBtn = this.querySelector('button[type="submit"]');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = "Saving...";
    submitBtn.disabled = true;

    fetch('/enroll', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            embedding: stagedEmbedding,
            name: nameInput,
            person_id: generatedPersonId
        })
    })
    .then(r => r.json())
    .then(data => {
        if (!data.success) {
            alert("Enrollment failed: " + data.error);
        }
        closeModal();
        updateFaces(); // Refresh UI instantly
    })
    .catch(err => {
        console.error("Enrollment error:", err);
        alert("A network error occurred. Check the Python terminal for details.");
        closeModal();
    })
    .finally(() => {
        // Restore button state just in case
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
    });
});

setInterval(updateFaces, 1000);
updateFaces();
</script>
</body>
</html>
